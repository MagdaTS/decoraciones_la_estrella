# openspec/config.yaml
schema: spec-driven

context: |
  Project: Decoraciones La Estrella — decoración temática para centros
  comerciales y espacios públicos. Sitio web institucional, una sola página.
  Tech stack: Astro 6.4.7 (output static) + Tailwind CSS v4.3.1
    (@tailwindcss/vite, via @theme in CSS, no config file) + TypeScript
    (astro/tsconfigs/strict) + FontAwesome 6.5.1 (CDN) + Google Fonts
    (Inter + Montserrat).
  Architecture: Single-page site (index.astro), 14 components, 1 layout,
    1 global CSS. JS pattern: inline IIFE inside <script> tags.
    Animation: animate-on-scroll class + IntersectionObserver.
    Business language: Spanish (MX).
  Testing: No test runner, no linter, no type-check script, no formatter
    configured. Playwright MCP used for manual visual verification only.
  Strict TDD: false — no test runner available.

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    - Keep JS inline IIFE pattern for client scripts
    - Use @theme for custom design tokens, never tailwind.config.js
    tdd: false
    test_command: ""
  verify:
    test_command: "astro build"
    build_command: "astro build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: false
  detected: "2026-06-22"
  runner:
    command: ""
    framework: "none"
  layers:
    unit:
      available: false
      tool: ""
    integration:
      available: false
      tool: ""
    e2e:
      available: false
      tool: ""
  coverage:
    available: false
    command: ""
  quality:
    linter:
      available: false
      command: ""
    type_checker:
      available: false
      command: ""
    formatter:
      available: false
      command: ""
